<script>
fetch("/api/tygia")
  .then(res => res.json())
  .then(data => {
    let html = "<table border='1' cellpadding='5'>";
    html += "<tr><th>Ngân hàng</th><th>Mua</th><th>Bán</th></tr>";

    data.forEach(item => {
      html += `<tr>
        <td>${item.bank}</td>
        <td>${item.buy}</td>
        <td>${item.sell}</td>
      </tr>`;
    });

    html += "</table>";
    document.getElementById("rate").innerHTML = html;
  })
  .catch(() => {
    document.getElementById("rate").innerHTML = "Lỗi tải dữ liệu";
  });
</script>
