<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tỷ giá USD Vietcombank</title>
</head>
<body>
    <h1>Tỷ giá USD - Vietcombank</h1>
    <div id="rate">Đang tải...</div>

    <script>
        fetch("/api/tygia")
            .then(res => res.json())
            .then(data => {
                document.getElementById("rate").innerHTML =
                    "Mua tiền mặt: " + data.buy_cash + "<br>" +
                    "Mua chuyển khoản: " + data.buy_transfer + "<br>" +
                    "Bán: " + data.sell;
            })
            .catch(() => {
                document.getElementById("rate").innerHTML = "Lỗi tải dữ liệu";
            });
    </script>
</body>
</html>
