<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<title>So Sánh Tỷ Giá USD</title>
<style>
body { font-family: Arial; background:#f4f6f9; }
.container { max-width:1000px; margin:30px auto; background:white; padding:20px; border-radius:10px; }
table { width:100%; border-collapse: collapse; margin-bottom:20px;}
th, td { border:1px solid #ddd; padding:10px; text-align:center; }
th { background:#007bff; color:white; }
h1 { text-align:center; }
select, input, button { padding:8px; margin:5px 0; }
.result { font-weight:bold; margin-top:10px; }
</style>
</head>
<body>

<div class="container">
<h1>💵 So Sánh Tỷ Giá USD</h1>

<h3>📊 Bảng Ngân Hàng (Cao → Thấp)</h3>
<table>
<thead>
<tr>
<th>Ngân Hàng</th>
<th>Giá Mua</th>
<th>Giá Bán</th>
</tr>
</thead>
<tbody id="bankTable"></tbody>
</table>

<h3>🧮 Tính Lợi Nhuận</h3>

<label>Chọn ngân hàng:</label><br>
<select id="bankSelect"></select><br>

<label>Nhập số tiền VND mua USD:</label><br>
<input type="number" id="moneyInput" placeholder="Ví dụ: 100000000"><br>

<button onclick="calculate()">Tính Lợi Nhuận</button>

<div class="result" id="result"></div>

<hr>

<h3>💰 Giá Chợ Đen</h3>
<p>Mua vào: <span id="blackBuy"></span></p>
<p>Bán ra: <span id="blackSell"></span></p>

</div>

<script>
let banks = [];
let blackBuy = 0;

async function loadData() {
  const res = await fetch("/api/rates");
  const data = await res.json();

  banks = data.banks;
  blackBuy = data.blackBuy;

  document.getElementById("blackBuy").innerText = data.blackBuy.toLocaleString();
  document.getElementById("blackSell").innerText = data.blackSell.toLocaleString();

  const table = document.getElementById("bankTable");
  const select = document.getElementById("bankSelect");

  table.innerHTML = "";
  select.innerHTML = "";

  banks.forEach(bank => {
    table.innerHTML += `
      <tr>
        <td>${bank.name}</td>
        <td>${bank.buy.toLocaleString()}</td>
        <td>${bank.sell.toLocaleString()}</td>
      </tr>
    `;

    select.innerHTML += `
      <option value="${bank.sell}">
        ${bank.name} - ${bank.sell.toLocaleString()}
      </option>
    `;
  });
}

function calculate() {
  const money = Number(document.getElementById("moneyInput").value);
  const bankSell = Number(document.getElementById("bankSelect").value);

  if (!money) {
    alert("Nhập số tiền!");
    return;
  }

  const usdBought = money / bankSell;
  const vndSellBlack = usdBought * blackBuy;
  const profit = vndSellBlack - money;

  document.getElementById("result").innerHTML = `
    Mua được: ${usdBought.toFixed(2)} USD<br>
    Bán chợ đen thu về: ${vndSellBlack.toLocaleString()} VND<br>
    <span style="color:${profit>0?'green':'red'}">
      Lợi nhuận: ${profit.toLocaleString()} VND
    </span>
  `;
}

loadData();
</script>

</body>
</html>
