<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tỷ Giá USD</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.price-bank { color: blue; font-weight: bold; }
.price-market { color: green; font-weight: bold; }

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

.profit {
  margin-top: 10px;
  font-weight: bold;
  color: green;
}
</style>
</head>

<body>

<div class="card">
  <h2>Tỷ giá USD các ngân hàng</h2>
  <table>
    <thead>
      <tr>
        <th>Ngân hàng</th>
        <th>Mua</th>
        <th>Bán</th>
      </tr>
    </thead>
    <tbody id="bank-table"></tbody>
  </table>
</div>

<div class="card">
  <h2>Chợ đen</h2>
  <p>Mua: <span id="market-buy" class="price-market"></span></p>
  <p>Bán: <span id="market-sell" class="price-market"></span></p>
</div>

<div class="card">
  <h2>Tính lợi nhuận</h2>
  <input type="number" id="usd" placeholder="Nhập số USD" oninput="calc()">
  <div class="profit" id="profit"></div>
</div>

<script>
let bankSell = 0;
let marketBuy = 0;

fetch("/api/tygia")
  .then(res => res.json())
  .then(data => {

    const table = document.getElementById("bank-table");

    data.banks.forEach(bank => {
      const row = `
        <tr>
          <td>${bank.name}</td>
          <td class="price-bank">${bank.buy}</td>
          <td class="price-bank">${bank.sell}</td>
        </tr>
      `;
      table.innerHTML += row;
    });

    document.getElementById("market-buy").innerText = data.blackMarket.buy;
    document.getElementById("market-sell").innerText = data.blackMarket.sell;

    // Lấy VCB làm mẫu tính lợi nhuận
    const vcb = data.banks.find(b => b.name.includes("VCB"));
    if (vcb) {
      bankSell = parseInt(vcb.sell.replace(/\D/g, ""));
      marketBuy = parseInt(data.blackMarket.buy.replace(/\D/g, ""));
    }
  });

function calc() {
  const usd = document.getElementById("usd").value;
  if (!usd || !bankSell || !marketBuy) return;

  const cost = usd * bankSell;
  const revenue = usd * marketBuy;
  const profit = revenue - cost;

  document.getElementById("profit").innerText =
    "Lợi nhuận: " + profit.toLocaleString("vi-VN") + " VND";
}
</script>

</body>
</html>
