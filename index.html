<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>So sánh tỷ giá USD</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.05);
}

h2 {
  margin-bottom: 15px;
}

button {
  padding: 8px 12px;
  margin-right: 10px;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

th {
  background: #f0f0f0;
}

.lowest {
  background: #d4edda;
  font-weight: bold;
}

select, input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

.result {
  margin-top: 15px;
  font-weight: bold;
  color: green;
}
</style>
</head>

<body>

<div class="card">
  <h2>So sánh tỷ giá USD hôm nay</h2>

  <button onclick="sortLow()">Giá bán thấp → cao</button>
  <button onclick="sortHigh()">Giá bán cao → thấp</button>

  <table>
    <thead>
      <tr>
        <th>Ngân hàng</th>
        <th>Mua</th>
        <th>Bán</th>
      </tr>
    </thead>
    <tbody id="bank-table"></tbody>
  </table>
</div>

<div class="card">
  <h2>Chọn nơi mua USD</h2>

  <label>Chọn ngân hàng:</label>
  <select id="bankSelect" onchange="updateSelectedBank()"></select>

  <label>Nhập số USD:</label>
  <input type="number" id="usdInput" placeholder="Ví dụ: 1000" oninput="calculateProfit()">

  <div class="result" id="result"></div>
</div>

<script>
let banks = [];
let selectedBankSell = 0;

fetch("/api/tygia")
  .then(res => res.json())
  .then(data => {
    banks = data.banks.map(b => ({
      name: b.name,
      buy: parseInt(b.buy.replace(/\D/g,'')),
      sell: parseInt(b.sell.replace(/\D/g,''))
    }));

    renderTable();
    populateDropdown();
  });

function renderTable() {
  const table = document.getElementById("bank-table");
  table.innerHTML = "";

  const lowestSell = Math.min(...banks.map(b => b.sell));

  banks.forEach(bank => {
    const row = document.createElement("tr");

    if (bank.sell === lowestSell) {
      row.classList.add("lowest");
    }

    row.innerHTML = `
      <td>${bank.name}</td>
      <td>${bank.buy.toLocaleString()}</td>
      <td>${bank.sell.toLocaleString()}</td>
    `;

    table.appendChild(row);
  });
}

function populateDropdown() {
  const select = document.getElementById("bankSelect");
  select.innerHTML = "";

  banks.forEach(bank => {
    const option = document.createElement("option");
    option.value = bank.sell;
    option.textContent = bank.name + " - Bán: " + bank.sell.toLocaleString();
    select.appendChild(option);
  });

  selectedBankSell = banks[0].sell;
}

function updateSelectedBank() {
  selectedBankSell = parseInt(document.getElementById("bankSelect").value);
  calculateProfit();
}

function calculateProfit() {
  const usd = parseFloat(document.getElementById("usdInput").value);
  if (!usd || !selectedBankSell) return;

  const total = usd * selectedBankSell;

  document.getElementById("result").innerText =
    "Tổng tiền phải trả: " + total.toLocaleString("vi-VN") + " VND";
}

function sortLow() {
  banks.sort((a,b) => a.sell - b.sell);
  renderTable();
}

function sortHigh() {
  banks.sort((a,b) => b.sell - a.sell);
  renderTable();
}
</script>

</body>
</html>
